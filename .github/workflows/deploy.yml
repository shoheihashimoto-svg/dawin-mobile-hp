name: Deploy to Xserver

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: FTP Deploy
        run: |
          sudo apt-get install -y lftp
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" ftp://sv35.xserver.jp <<'EOF'
          set ftp:ssl-allow no
          set net:timeout 30
          mirror --reverse --delete --verbose dist/ ./
          quit
          EOF
