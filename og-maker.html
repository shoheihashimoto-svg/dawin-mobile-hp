<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1200px; height: 630px; overflow: hidden; background: #030712; }

    .card {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #030712 0%, #0a1628 60%, #0f1f3d 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 90px;
      position: relative;
      overflow: hidden;
      font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
    }

    /* 背景の装飾円 */
    .card::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 70%);
      right: -100px;
      top: -150px;
    }
    .card::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, transparent 70%);
      left: -50px;
      bottom: -100px;
    }

    /* 左コンテンツ */
    .left {
      position: relative;
      z-index: 1;
    }

    .tag {
      display: inline-block;
      background: #2563eb;
      color: white;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 28px;
      text-transform: uppercase;
    }

    .main-title {
      font-size: 80px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .main-title .dawin {
      color: #ffffff;
    }
    .main-title .mobile {
      color: #3b82f6;
    }

    .underscore {
      font-size: 80px;
      font-weight: 900;
      color: #3b82f6;
      line-height: 1;
    }

    .subtitle {
      font-size: 20px;
      color: #94a3b8;
      font-weight: 500;
      margin-top: 24px;
      letter-spacing: 0.05em;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: #2563eb;
      margin: 20px 0;
      border-radius: 2px;
    }

    .footer-text {
      font-size: 14px;
      color: #475569;
      letter-spacing: 0.1em;
      font-weight: 600;
      margin-top: 20px;
    }

    /* 右：ロゴエリア */
    .right {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 32px;
      padding: 48px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      backdrop-filter: blur(10px);
    }

    /* DAWINロゴ SVG */
    .logo-svg {
      width: 160px;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: #64748b;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* 採用中バッジ */
    .badge {
      position: absolute;
      bottom: 48px;
      right: 90px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 1;
    }
    .badge-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .badge-text {
      font-size: 13px;
      color: #22c55e;
      font-weight: 700;
      letter-spacing: 0.1em;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
</head>
<body>
<div class="card">

  <!-- 左：テキスト -->
  <div class="left">
    <div class="main-title">
      <span class="dawin">DAWIN</span><br>
      <span class="mobile">_mobile</span>
    </div>
    <div class="footer-text">株式会社ダウイン モバイル事業部</div>
  </div>

  <!-- 右：ロゴ -->
  <div class="right">
    <div class="logo-wrap">
      <!-- DAWINロゴ（SVGで再現） -->
      <svg class="logo-svg" viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- ピンクの三角（中央揃え・小さめ） -->
        <polygon points="32,18 69,53 32,88" fill="#e91e8c" opacity="0.9"/>
        <!-- グリーン系の縦棒 -->
        <rect x="79" y="23" width="13" height="65" rx="2" fill="#4caf50"/>
        <rect x="97" y="33" width="13" height="55" rx="2" fill="#8bc34a"/>
        <rect x="115" y="43" width="13" height="45" rx="2" fill="#cddc39"/>
        <!-- DAWIN テキスト：左端=三角、右端=バー末尾に揃える -->
        <text x="32" y="115" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" fill="#ffffff" letter-spacing="6">DAWIN</text>
      </svg>
      <div class="logo-name">Mobile Division</div>
    </div>
  </div>

  <!-- 採用中バッジ -->
  <div class="badge">
    <div class="badge-dot"></div>
    <div class="badge-text">NOW HIRING</div>
  </div>

</div>
</body>
</html>
